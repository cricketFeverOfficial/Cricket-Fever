<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cricket Fever Quiz</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
🏏 Cricket Fever Quiz
</header>

<div class="container">

<h2 id="question">Loading Question...</h2>

<div id="options"></div>

<h3 id="score">Score: 0</h3>

<button onclick="nextQuestion()">
Next Question ➡️
</button>

</div>


<script>

let questions = [
{
question: "Who is known as the King of Cricket?",
options: [
"Rohit Sharma",
"Virat Kohli",
"MS Dhoni",
"Sachin Tendulkar"
],
answer: "Virat Kohli"
},

{
question: "Who scored 264 runs in ODI cricket?",
options: [
"Virat Kohli",
"Rohit Sharma",
"Chris Gayle",
"AB de Villiers"
],
answer: "Rohit Sharma"
}, 

{
question: "How many players are there in a cricket team?",
options: [
"9",
"10",
"11",
"12"
],
answer: "11"
}, 

{
question: "Who won the first ICC T20 World Cup in 2007?",
options: [
"India",
"Pakistan",
"Australia",
"England"
],
answer: "India"
},

{
question: "How many overs are there in a T20 match per side?",
options: [
"10",
"20",
"50",
"40"
],
answer: "20"
},

{
question: "Who is known as the Captain Cool?",
options: [
"Virat Kohli",
"MS Dhoni",
"Rohit Sharma",
"Sourav Ganguly"
],
answer: "MS Dhoni"
},

{
question: "Which team won the ODI World Cup 2023?",
options: [
"India",
"Australia",
"England",
"New Zealand"
],
answer: "Australia"
},

{
question: "Who has taken 800+ wickets in Test cricket?",
options: [
"Shane Warne",
"Muttiah Muralitharan",
"James Anderson",
"Anil Kumble"
],
answer: "Muttiah Muralitharan"
}, 
  
{
question: "Who is the highest run scorer in IPL history?",
options: [
"Rohit Sharma",
"Virat Kohli",
"MS Dhoni",
"Chris Gayle"
],
answer: "Virat Kohli"
},

{
question: "Which bowler is known as the 'Yorker King'?",
options: [
"Jasprit Bumrah",
"Lasith Malinga",
"Mitchell Starc",
"Wasim Akram"
],
answer: "Lasith Malinga"
},

{
question: "Who won the 2011 Cricket World Cup?",
options: [
"India",
"Sri Lanka",
"Australia",
"Pakistan"
],
answer: "India"
},

{
question: "How many runs are awarded for a boundary hit over the rope?",
options: [
"4",
"5",
"6",
"7"
],
answer: "6"
},

{
question: "Who was the first Indian to score a double century in ODI cricket?",
options: [
"Sachin Tendulkar",
"Virender Sehwag",
"Rohit Sharma",
"MS Dhoni"
],
answer: "Sachin Tendulkar"
},
];
  
let currentQuestion = 0;
let score = 0;


function loadQuestion(){

let q = questions[currentQuestion];

document.getElementById("question").innerHTML = q.question;

let optionBox = document.getElementById("options");

optionBox.innerHTML="";


q.options.forEach(function(option){

let button = document.createElement("button");

button.innerHTML = option;

button.onclick = function(){

if(option == q.answer){
score++;
}

document.getElementById("score").innerHTML =
"Score: " + score;

};

optionBox.appendChild(button);

});

}


function nextQuestion(){

currentQuestion++;

if(currentQuestion < questions.length){

loadQuestion();

}
else{

document.getElementById("question").innerHTML =
"Quiz Finished! 🎉";

document.getElementById("options").innerHTML =
"Your Score: " + score;

}

}


loadQuestion();

</script>


</body>
</html
